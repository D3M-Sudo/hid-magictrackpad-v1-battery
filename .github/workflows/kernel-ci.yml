name: Kernel Module Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Headers
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-generic

      - name: Build Test
        run: |
          # Cerca il Makefile nella root o nelle sottocartelle
          MAKEFILE_PATH=$(find . -name Makefile | head -n 1)
          if [ -n "$MAKEFILE_PATH" ]; then
            cd $(dirname "$MAKEFILE_PATH")
            make
          else
            echo "Nessun Makefile trovato nel repository."
            exit 1
          fi
